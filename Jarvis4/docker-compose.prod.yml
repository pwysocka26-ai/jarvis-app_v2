services:
  jarvis-api:
    image: jarvis:0.1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://jarvis:jarvis@db:5432/jarvis
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=jarvis
      - POSTGRES_PASSWORD=jarvis
      - POSTGRES_DB=jarvis
    volumes:
      - jarvis_pgdata:/var/lib/postgresql/data

volumes:
  jarvis_pgdata:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  opa:
    image: openpolicyagent/opa:0.67.1
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./policy:/policies:ro
