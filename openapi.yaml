openapi: 3.0.3
info:
  title: Jarvis Orchestrator API
  version: "0.1"
  description: >
    Enterprise-ready orchestration API for Jarvis.
    All side-effect actions MUST go through approval workflow.
servers:
  - url: /
tags:
  - name: Chat
  - name: Approvals
  - name: Health
  - name: Admin

paths:
  /v1/health:
    get:
      tags: [Health]
      summary: Liveness/Readiness probe
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/chat:
    post:
      tags: [Chat]
      summary: Chat / orchestration entrypoint
      description: >
        Accepts user request and returns an orchestration response.
        If the request includes side-effects, the response contains an approval_id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response (may require approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/approvals/{approval_id}:
    get:
      tags: [Approvals]
      summary: Get approval request
      parameters:
        - in: path
          name: approval_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Approval request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/approvals/{approval_id}/decision:
    post:
      tags: [Approvals]
      summary: Approve or reject an action plan
      description: >
        Approving will execute the plan's steps with dry_run=false (idempotent).
      parameters:
        - in: path
          name: approval_id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecision"
      responses:
        "200":
          description: Decision accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/admin/audit:
    get:
      tags: [Admin]
      summary: List audit events (admin)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: actor_filter
          schema: { type: string, nullable: true }
        - in: query
          name: action_filter
          schema: { type: string, nullable: true }
        - in: query
          name: since_iso
          schema: { type: string, nullable: true }
      responses:
        "200":
          description: Audit events list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        timestamp: { type: string, format: date-time }
                        actor: { type: string }
                        action: { type: string }
                        request_id: { type: string, nullable: true }
                        trace_id: { type: string, nullable: true }
                  request_id: { type: string, nullable: true }
                  trace_id: { type: string, nullable: true }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/admin/audit/{event_id}:
    get:
      tags: [Admin]
      summary: Get an audit event by id (admin)
      parameters:
        - in: path
          name: event_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Audit event
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  timestamp: { type: string, format: date-time }
                  actor: { type: string }
                  action: { type: string }
                  request_id: { type: string, nullable: true }
                  trace_id: { type: string, nullable: true }
                  payload_json: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error_code: bad_request
            message: "Invalid payload"
    Unauthorized:
      description: Missing/invalid auth token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error_code: unauthorized
            message: "Missing or invalid token"
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error_code: forbidden
            message: "Insufficient permissions"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error_code: not_found
            message: "Not found"
    Conflict:
      description: Conflict (e.g., approval already decided)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error_code: conflict
            message: "Already decided"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error_code: rate_limited
            message: "Too many requests"
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error_code: internal_error
            message: "Unexpected error"

  schemas:
    HealthResponse:
      type: object
      properties:
        ok: { type: boolean }
        version: { type: string }
        time_utc: { type: string, format: date-time }
      required: [ok, version, time_utc]

    ChatRequest:
      type: object
      additionalProperties: false
      properties:
        user_id: { type: string, minLength: 1 }
        workspace_id: { type: string, minLength: 1 }
        project_id: { type: string, nullable: true }
        text: { type: string, minLength: 1 }
      required: [user_id, workspace_id, text]

    ToolCall:
      type: object
      additionalProperties: false
      properties:
        tool_name: { type: string }
        arguments:
          type: object
          additionalProperties: true
        dry_run: { type: boolean, default: true }
        idempotency_key: { type: string }
      required: [tool_name, arguments, dry_run, idempotency_key]

    ActionPlan:
      type: object
      additionalProperties: false
      properties:
        intent: { type: string }
        summary: { type: string }
        side_effects: { type: boolean, default: false }
        steps:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
      required: [intent, summary, side_effects, steps]

    ChatResponse:
      type: object
      additionalProperties: false
      properties:
        message: { type: string }
        plan:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
        approval_required: { type: boolean, default: false }
        approval_id:
          oneOf:
            - type: integer
              minimum: 1
            - type: "null"
      required: [message, approval_required]

    ApprovalResponse:
      type: object
      additionalProperties: false
      properties:
        id: { type: integer }
        status: { type: string, enum: [pending, approved, rejected] }
        actor: { type: string }
        created_at: { type: string, format: date-time }
        decided_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        plan: { type: string }
      required: [id, status, actor, created_at, plan]

    ApprovalDecision:
      type: object
      additionalProperties: false
      properties:
        actor: { type: string, minLength: 1 }
        decision: { type: string, enum: [approved, rejected] }
        note:
          oneOf:
            - type: string
            - type: "null"
      required: [actor, decision]

    ApprovalDecisionResponse:
      type: object
      additionalProperties: false
      properties:
        ok: { type: boolean }
        id: { type: integer }
        status: { type: string, enum: [approved, rejected] }
      required: [ok, id, status]

    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        error_code: { type: string }
        message: { type: string }
        details:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
      required: [error_code, message]
